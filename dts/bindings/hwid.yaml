description: |
  A hardware ID GPIO pin that reads the GPIO level defined in input-gpios.

  Example definition in devicetree:

    hwid {
        compatible = "hwid";
        hwid1 {
          label = "HWID1";
          gpios = <&gpioa 0 (GPIO_OPEN_DRAIN | GPIO_ACTIVE_HIGH)>;
        };
        hwid2 {
          label = "HWID2";
          gpios = <&gpioa 1 (GPIO_OPEN_DRAIN | GPIO_ACTIVE_HIGH)>;
        };
    };

compatible: "hwid"

child-binding:
  description: GPIO HWID child node
  properties:
    gpios:
      type: phandle-array
      required: true
    label:
      type: string
      description: |
        Human readable string describing the HWID pin. It can be used by an
        application to identify this HWID pin or to retrieve its number/index
        (i.e. child node number) on the parent device.
