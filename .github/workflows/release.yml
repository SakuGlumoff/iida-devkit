name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}
      - name: Build docker image
        # Build the docker image with current user's IDs so that permissions to the workspace are retained.
        run: docker build -t iida-devkit .devcontainer --build-arg USER_UID=$(id -u) --build-arg USER_GID=$(id -g)
      - name: Export HW design files
        run: |
          docker run -v $PWD:/iida-devkit -w /iida-devkit iida-devkit \
          /bin/bash -c "\
            mkdir ./hardware/manufacturing && \
            kicad-cli sch export pdf --output iida_devkit.pdf ./hardware/iida_devkit.kicad_sch \
          "
      - name: Archive HW design files
        uses: actions/upload-artifact@v4
        with:
          name: hardware
          path: iida_devkit.pdf
          if-no-files-found: error
      - name: Build firmware
        run: |
          docker run -v $PWD:/iida-devkit -w /iida-devkit iida-devkit \
          /bin/bash -c "\
            python3 -m venv .venv && source .venv/bin/activate && \
            pip install west && \
            west init . && \
            west update && \
            pip install -r zephyr/scripts/requirements.txt && \
            west zephyr-export && \
            west sdk install -t arm-zephyr-eabi && \
            west build -b iida_devkit@4.2.1 . -- -DBOARD_ROOT=. && \
            mv ./build/zephyr/zephyr.hex iida_devkit.hex
          "
      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: iida_devkit.hex
          if-no-files-found: error
  release:
    needs: [build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: hardware
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: artifacts
      - name: Create a release
        run: |
          RELEASE_VERSION="$(echo ${GITHUB_REF_NAME} | cut -f1 -d-)"
          gh release create ${GITHUB_REF_NAME} \
            --title ${RELEASE_VERSION} \
            --draft \
            --generate-notes \
            --prerelease
          gh release upload ${GITHUB_REF_NAME} artifacts/* --clobber
